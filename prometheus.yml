global:
  scrape_interval: 15s # Cada cuánto tiempo recolecta métricas

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus' # La ruta que habilitamos en el Paso 1
    static_configs:
      - targets: ['spring-app:8080'] # El nombre del servicio en docker-compose y su puerto