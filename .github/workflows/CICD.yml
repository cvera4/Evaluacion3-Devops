name: Spring Boot App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/benjav892/evaluacion2-devops

jobs:
  build-and-test:
    name: Build & Test (IE1, IE2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests with JaCoCo coverage (IE2)
        run: mvn clean test

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Build Docker image (IE1)
        run: |
          docker build -f Dockerfile.multistage -t ${{ env.IMAGE_NAME }}:latest .

  security-scan:
    name: Security Scan (IE3)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "$SNYK_TOKEN"

      - name: Run Snyk scan and generate reports
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p snyk-reports
          snyk test \
            --all-projects \
            --json-file-output=snyk-reports/snyk-result.json \
            --sarif-file-output=snyk-reports/snyk-result.sarif \
            || true

      - name: Block pipeline if high vulnerabilities found (IE3)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          HIGH=$(cat snyk-reports/snyk-result.json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', [])
          count = sum(1 for v in vulns if v.get('severity') in ['high','critical'])
          print(count)
          " 2>/dev/null || echo "0")
          echo "Vulnerabilidades high/critical encontradas: $HIGH"
          if [ "$HIGH" -gt 3 ]; then
            echo "ERROR: Se encontraron $HIGH vulnerabilidades de severidad alta o crítica."
            echo "El pipeline se detiene para proteger la calidad del proyecto."
            exit 1
          fi
          echo "OK: El umbral de seguridad es aceptable."

      - name: Upload Snyk reports
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: snyk-reports/
          retention-days: 14

  publish-and-deploy:
    name: Publish Image & Deploy (IE1, IE4, IE5)
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR (IE1)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.multistage
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy with Docker Compose in simulated environment (IE4, IE5)
        run: |
          docker compose up -d
          echo "Esperando que la aplicación levante..."
          sleep 15
          docker compose ps
          echo "Verificando endpoint /greetings..."
          curl --fail http://localhost:8080/greetings || (docker compose logs && exit 1)
          echo "Despliegue exitoso."

      - name: Tear down environment
        if: always()
        run: docker compose down
